<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀 타로 - 찐친의 정밀 AI 리딩</title>
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #14121f; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #f5f5f7;
        }

        .container {
            width: 100%;
            max-width: 900px; 
            background-color: #1e1b2e;
            border-radius: 28px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
            padding: 30px;
            box-sizing: border-box;
            text-align: center;
        }

        .friend-speech-area {
            background-color: #14121f;
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 25px;
            font-size: 1.05em;
            line-height: 1.6;
            text-align: left;
            border-left: 5px solid #6c5ce7;
        }
        .friend-speech-area b { color: #ffeaa7; }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }
        .two-cols { grid-template-columns: 1fr 1fr; }

        button {
            padding: 15px 20px;
            font-size: 1em;
            background-color: #2e2a47;
            color: white;
            border: 2px solid #3f395e;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 500;
        }
        button:hover:not(:disabled) {
            background-color: #6c5ce7;
            border-color: #a29bfe;
        }
        button.selected-btn {
            background-color: #6c5ce7;
            border-color: #ffeaa7;
        }

        #customInputWrapper {
            display: none;
            margin-bottom: 20px;
        }
        input[type="text"] {
            width: 100%;
            padding: 15px;
            border-radius: 14px;
            border: 2px solid #3f395e;
            background-color: #14121f;
            color: #fff;
            font-size: 1em;
            margin-bottom: 12px;
            box-sizing: border-box;
            outline: none;
        }
        input[type="text"]:focus {
            border-color: #a29bfe;
        }

        #tarot-section {
            display: none;
            margin-top: 20px;
        }

        @keyframes shuffle {
            0% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(-70px, -15px) rotate(-10deg); }
            50% { transform: translate(70px, 15px) rotate(10deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }

        .shuffle-pile {
            position: relative;
            width: 120px;
            height: 200px;
            margin: 40px auto;
            display: none;
        }
        .shuffle-pile .card-back-mesh {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
            border: 2px solid #a29bfe;
            animation: shuffle 0.7s ease-in-out infinite;
        }
        .pile-2 { animation-delay: 0.15s !important; }
        .pile-3 { animation-delay: 0.3s !important; }

        .card-fan-container {
            position: relative;
            height: 380px; 
            margin-top: 30px;
            background-color: #0d0b14; 
            border-radius: 20px;
            padding: 20px;
            box-sizing: border-box;
            overflow: hidden;
            display: none;
        }

        .fan-card {
            position: absolute;
            transform-origin: center 380px; 
            top: 20px;
            left: calc(50% - 40px); 
            width: 80px;  
            height: 140px; 
            background: linear-gradient(135deg, #5f27cd, #6c5ce7); 
            border: 2px solid #a29bfe;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            cursor: pointer;
            transition: transform 0.2s ease, top 0.2s ease, box-shadow 0.2s ease;
        }

        .fan-card:hover {
            top: -15px; 
            border-color: #ffeaa7;
            box-shadow: 0 12px 25px rgba(255, 234, 167, 0.4);
            z-index: 999 !important;
        }

        #result-box {
            display: none;
            background-color: #14121f;
            border-radius: 16px;
            padding: 30px;
            text-align: left;
            margin-top: 25px;
            border: 1px solid #2e2a47;
        }

        .result-title {
            font-weight: bold;
            font-size: 1.2em;
            margin-bottom: 25px;
            color: #ffeaa7;
            border-bottom: 1px dashed #2e2a47;
            padding-bottom: 15px;
        }

        .reading-grid-layout {
            display: grid;
            gap: 25px;
        }
        .grid-three { grid-template-columns: 1fr 1fr 1fr; }

        .spread-card-cell { text-align: center; }
        .cell-tag { font-size: 0.9em; font-weight: bold; color: #a29bfe; margin-bottom: 10px; }

        .revealed-card {
            width: 110px;
            height: 180px;
            background-color: #ffeaa7;
            color: #2d3436;
            border-radius: 12px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 10px;
            box-sizing: border-box;
            border: 3px solid #fdcb6e;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }

        .interpretation-text-area {
            line-height: 1.8;
            font-size: 1.05em;
            color: #f5f5f7;
            margin-top: 25px;
            background-color: #1e1b2e;
            padding: 25px;
            border-radius: 14px;
            border-left: 4px solid #fdcb6e;
        }

        .final-conclusion { 
            line-height: 1.8;
            color: #f5f5f7;
        }

        .loading-dots span { animation: blink 1.4s infinite both; font-size: 1.5em; color: #fdcb6e; }
        .loading-dots span:nth-child(2) { animation-delay: .2s; }
        .loading-dots span:nth-child(3) { animation-delay: .4s; }
        @keyframes blink { 0% { opacity: .2; } 20% { opacity: 1; } 100% { opacity: .2; } }

        .reset-btn {
            background-color: #ffeaa7;
            color: #2d3436;
            margin-top: 30px;
            width: 100%;
            border: none;
            font-weight: bold;
            font-size: 1.05em;
            padding: 15px;
            border-radius: 14px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .reset-btn:hover { background-color: #f1d279; }
    </style>
</head>
<body>

<div class="container">
    <div class="friend-speech-area" id="friendSpeech">
        어어, 왔어? 기다리고 있었지! <br>요즘 무슨 고민 있어? 마음 편하게 어떤 분야인지 골라봐. 같이 들어줄게.
    </div>

    <div class="btn-group two-cols" id="categoryGroup">
        <button onclick="selectCategory('연애')">❤️ 연애운</button>
        <button onclick="selectCategory('성적')">📝 학업/성적</button>
        <button onclick="selectCategory('금전')">💰 금전운</button>
        <button onclick="selectCategory('관계')">🤝 인간관계</button>
    </div>

    <div class="btn-group" id="questionGroup" style="display: none;"></div>

    <div id="customInputWrapper">
        <input type="text" id="userCustomQuestion" placeholder="여기에 구체적인 고민을 적어줘...">
        <button style="width:100%;" onclick="submitCustomQuestion()">이 고민으로 결정! 🚀</button>
    </div>

    <div class="btn-group two-cols" id="spreadGroup" style="display: none;">
        <button id="oneCardBtn" onclick="startShuffle('one')">🎴 한 장만 쏙 뽑기 (원카드)</button>
        <button id="threeCardBtn" onclick="startShuffle('three')">🎴🎴🎴 흐름 분석하기 (쓰리카드)</button>
    </div>

    <div id="tarot-section">
        <div class="shuffle-pile" id="shufflePile">
            <div class="card-back-mesh pile-1"></div>
            <div class="card-back-mesh pile-2"></div>
            <div class="card-back-mesh pile-3"></div>
        </div>
        <div class="card-fan-container" id="cardFanContainer"></div>
    </div>

    <div id="result-box">
        <div class="result-title" id="chosenQuestionTitle">선택한 질문</div>
        <div class="reading-grid-layout" id="readingGridLayout"></div>
        <div class="interpretation-text-area" id="friendInterpretationText"></div>
        <button class="reset-btn" onclick="resetAll()">다른 고민도 얘기하기</button>
    </div>
</div>

<script>
    const tarotNames = {
        '0': 'The Fool', 'I': 'The Magician', 'II': 'The High Priestess', 'III': 'The Empress',
        'IV': 'The Emperor', 'V': 'The Hierophant', 'VI': 'The Lovers', 'VII': 'The Chariot',
        'VIII': 'Strength', 'IX': 'The Hermit', 'X': 'Wheel of Fortune', 'XI': 'Justice',
        'XII': 'The Hanged Man', 'XIII': 'Death', 'XIV': 'Temperance', 'XV': 'The Devil',
        'XVI': 'The Tower', 'XVII': 'The Star', 'XVIII': 'The Moon', 'XIX': 'The Sun',
        'XX': 'Judgement', 'XXI': 'The World'
    };

    const questions = {
        '연애': ["내가 좋아하는 사람이 나를 어떻게 생각할까?", "나를 좋아하는 사람이 있을까?", "언제쯤 연애를 하게 될까?"],
        '성적': ["이번 시험 잘 볼 수 있을까?", "앞으로 이렇게 공식이나 계획대로 공부하면 될까?", "부족한 점을 채우기 위해 어떻게 공부해야할까?"],
        '금전': ["올해 내 금전운은 어떨까?", "미래의 나는 돈을 잘 벌까?"],
        '관계': ["그 친구와 잘 지낼 수 있을까?", "그 친구는 나를 어떻게 생각할까?", "그 친구와 더 친해질 수 있는 시기는 언제일까?"]
    };

    let session = { category: '', question: '', spread: '', selected: [], toPick: 0, availableKeys: [] };

    function selectCategory(cat) {
        session.category = cat;
        document.getElementById('friendSpeech').innerHTML = `오라, <b>${cat}</b>운이 궁금하구나! <br>추천 질문을 고르거나 아래 입력창에 직접 너만의 고민을 써줘!`;
        
        document.querySelectorAll('#categoryGroup button').forEach(b => {
            if(b.innerText.includes(cat)) b.classList.add('selected-btn'); else b.style.display = 'none';
        });

        const qGroup = document.getElementById('questionGroup');
        qGroup.innerHTML = '';
        questions[cat].forEach(q => {
            const b = document.createElement('button'); b.innerText = q;
            b.onclick = () => { selectThisQuestion(q, b); };
            qGroup.appendChild(b);
        });
        
        const customBtn = document.createElement('button');
        customBtn.innerText = "✍️ 내 고민 직접 입력하기...";
        customBtn.style.borderColor = "#6c5ce7";
        customBtn.onclick = () => {
            qGroup.style.display = 'none';
            document.getElementById('customInputWrapper').style.display = 'block';
        };
        qGroup.appendChild(customBtn);
        qGroup.style.display = 'grid';
    }

    function selectThisQuestion(q, clickedBtn) {
        session.question = q;
        document.getElementById('friendSpeech').innerHTML = `<b>"${q}"</b> 이거구나. <br>그럼 카드를 한 장만 깔끔하게 볼래, 아님 과거-현재-미래 흐름을 다 볼래?`;
        
        document.querySelectorAll('#questionGroup button').forEach(qb => { 
            if(qb !== clickedBtn) qb.style.display = 'none'; else qb.classList.add('selected-btn'); 
        });
        document.getElementById('customInputWrapper').style.display = 'none';
        document.getElementById('spreadGroup').style.display = 'grid';
    }

    function submitCustomQuestion() {
        const txt = document.getElementById('userCustomQuestion').value.trim();
        if(!txt) { alert("고민 내용을 입력해줘!"); return; }
        session.question = txt;
        document.getElementById('customInputWrapper').style.display = 'none';
        document.getElementById('friendSpeech').innerHTML = `<b>"${txt}"</b> 직접 적어준 고민이네! <br>카드를 한 장만 볼래, 아님 과거-현재-미래 쓰리카드로 볼래?`;
        document.getElementById('spreadGroup').style.display = 'grid';
    }

    function startShuffle(spreadType) {
        session.spread = spreadType;
        session.toPick = spreadType === 'one' ? 1 : 3;
        session.availableKeys = Object.keys(tarotNames); 
        session.selected = [];

        document.querySelectorAll('#spreadGroup button').forEach(b => {
            if(b.id.includes(spreadType)) b.classList.add('selected-btn'); else b.style.display = 'none';
        });

        document.getElementById('tarot-section').style.display = 'block';
        const pile = document.getElementById('shufflePile');
        pile.style.display = 'block';
        document.getElementById('friendSpeech').innerHTML = "정성껏 섞어줄게. 속으로 네 질문을 계속 간절하게 생각하고 있어봐!";

        setTimeout(() => {
            pile.style.display = 'none';
            generateCardFan();
        }, 1500);
    }

    function generateCardFan() {
        const container = document.getElementById('cardFanContainer');
        container.innerHTML = '';
        container.style.display = 'block';
        document.getElementById('friendSpeech').innerHTML = `오리지널 퍼플 스킨으로 무지개 배열 완료! 💜 <br>마음에 드는 위치의 카드를 <b>${session.toPick}장</b>만 콕 집어서 골라줘.`;

        const totalCards = 22; 
        const startAngle = -55; 
        const endAngle = 55;   
        const angleStep = (endAngle - startAngle) / (totalCards - 1);

        for (let i = 0; i < totalCards; i++) {
            const card = document.createElement('div');
            card.className = 'fan-card';
            const currentAngle = startAngle + (angleStep * i);
            card.style.transform = `rotate(${currentAngle}deg)`;
            card.style.zIndex = i + 1; 
            
            card.onclick = () => {
                card.style.visibility = 'hidden'; 
                pickCardLogic();
            };
            container.appendChild(card);
        }
    }

    function pickCardLogic() {
        if (session.toPick <= 0) return;
        session.toPick--;

        const randomIndex = Math.floor(Math.random() * session.availableKeys.length);
        const chosenKey = session.availableKeys.splice(randomIndex, 1)[0]; 
        const isRegular = Math.random() < 0.5;
        
        session.selected.push({ key: chosenKey, name: tarotNames[chosenKey], isRegular: isRegular });

        if (session.toPick > 0) {
            document.getElementById('friendSpeech').innerHTML = `오케이 골랐고! 흐름을 마저 봐야 하니까 <b>${session.toPick}장</b> 더 터치해줘!`;
        } else {
            showFinalResultAndFetchAI();
        }
    }

    async function showFinalResultAndFetchAI() {
        document.getElementById('tarot-section').style.display = 'none';
        document.getElementById('chosenQuestionTitle').innerText = `💬 네 고민: "${session.question}"`;

        const grid = document.getElementById('readingGridLayout');
        grid.innerHTML = '';
        if (session.spread === 'one') grid.classList.remove('grid-three'); else grid.classList.add('grid-three');

        const tags = ['[과거의 흐름]', '[현재의 상황]', '[미래의 결과]'];
        const cardsForAI = session.selected.map(card => `${card.name} (${card.isRegular ? '정방향' : '역방향'})`);

        session.selected.forEach((card, idx) => {
            const direction = card.isRegular ? '정방향' : '역방향';

            const cell = document.createElement('div');
            cell.className = 'spread-card-cell';
            cell.innerHTML = `
                <div class="cell-tag">${session.spread === 'one' ? '[오늘의 운세]' : tags[idx]}</div>
                <div class="revealed-card" style="${card.isRegular ? '' : 'transform: scaleY(-1);'}">
                    <div style="${card.isRegular ? '' : 'transform: scaleY(-1);'}">
                        <b style="font-size:1.15em;">${card.key}</b><br>
                        <span style="font-size:0.85em;">${card.name}</span><br>
                        <span style="font-size:0.65em; color:#7d6a50;">(${direction})</span>
                    </div>
                </div>
            `;
            grid.appendChild(cell);
        });

        document.getElementById('friendSpeech').innerHTML = "흠... 카드가 꽤 흥미롭게 나왔네. 잠시만 기다려봐, 찐친 마스터 AI가 정밀 분석 중이야!";
        document.getElementById('friendInterpretationText').innerHTML = `
            <div style="text-align:center; padding: 20px;" class="loading-dots">
                <p style="margin-bottom:10px; color:#a29bfe;">AI가 카드의 기운을 융합 해석하는 중...</p>
                <span>●</span> <span>●</span> <span>●</span>
            </div>`;
        document.getElementById('result-box').style.display = 'block';

        try {
            const BACKEND_URL = 'https://tarot-backend-ljr1.onrender.com';

            const response = await fetch(`${BACKEND_URL}/api/tarot`, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                },
                body: JSON.stringify({
                    category: session.category,
                    question: session.question,
                    spread: session.spread,
                    cards: cardsForAI
                })
            });

            if (!response.ok) {
                throw new Error(`HTTP 에러 발생! 상태코드: ${response.status}`);
            }
            
            const data = await response.json();
            
            // ** 제거 및 자연스러운 줄바꿈 처리
            let cleanResult = data.result.replace(/\*\*/g, ''); 
            const formattedResult = cleanResult.replace(/\n/g, '<br>');

            document.getElementById('friendInterpretationText').innerHTML = `
                <div class="final-conclusion">
                    <h3 style="color:#ffeaa7; margin-top:0; border-bottom:1px solid #3f395e; padding-bottom:10px; font-size:1.1em;">🔮 찐친 마스터의 AI 정밀 분석</h3>
                    <p style="margin:15px 0 0 0; line-height:1.8;">${formattedResult}</p>
                </div>`;
            document.getElementById('friendSpeech').innerHTML = "결과 해석 끝났어! 카드별 의미랑 종합 결론까지 싹 풀었으니 읽어봐! 🔮";

        } catch (error) {
            console.error('Fetch 에러 로그:', error);
            document.getElementById('friendInterpretationText').innerHTML = `
                <div style="color:#ff7675; line-height: 1.6;">
                    <p><b>앗, AI 서버와 연결에 실패했어! 🥲</b></p>
                    <p style="font-size: 0.9em; color: #b2bec3;">
                        이유 1: Render 무료 서버가 첫 접속 시 1~2분 정도 잠에서 깨어나는 로딩 시간이 필요해.<br>
                        이유 2: 백엔드 서버(server.js)의 CORS 허용 설정이 프론트엔드 도메인을 막고 있을 수 있어.
                    </p>
                    <button onclick="showFinalResultAndFetchAI()" style="background-color: #6c5ce7; border: none; padding: 10px 15px; margin-top: 10px; width: auto; font-size: 0.9em; color: white; border-radius: 8px; cursor: pointer;">
                        🔄 다시 한 번 결과 요청하기
                    </button>
                </div>`;
        }
    }

    function resetAll() {
        session = { category: '', question: '', spread: '', selected: [], toPick: 0, availableKeys: [] };
        document.getElementById('friendSpeech').innerHTML = "어어, 왔어? 기다리고 있었지! <br>요즘 무슨 고민 있어? 마음 편하게 어떤 분야인지 골라봐. 같이 들어줄게.";
        document.getElementById('categoryGroup').style.display = 'grid';
        document.querySelectorAll('#categoryGroup button').forEach(b => { b.classList.remove('selected-btn'); b.style.display = 'block'; });
        document.getElementById('questionGroup').style.display = 'none';
        document.getElementById('customInputWrapper').style.display = 'none';
        document.getElementById('userCustomQuestion').value = '';
        document.getElementById('spreadGroup').style.display = 'none';
        document.querySelectorAll('#spreadGroup button').forEach(b => { b.classList.remove('selected-btn'); b.style.display = 'block'; });
        document.getElementById('tarot-section').style.display = 'none';
        document.getElementById('cardFanContainer').style.display = 'none';
        document.getElementById('result-box').style.display = 'none';
    }
</script>

</body>
</html>
